name: Deploy to Pages

# 触发条件：推送到 main 分支
on:
  push:
    branches: [ main ]

# 🔴 核心：顶层全局权限配置，必须写在 jobs 外面，确保所有 job 拿到权限
permissions:
  contents: read       # 读取仓库代码的基础权限
  pages: write         # 操作 GitHub Pages 的权限
  id-token: write      # 部署必需的 OIDC 认证权限，解决报错的核心

# 强制使用 Node.js 24，彻底解决弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 🔴 必须配置 environment，和权限配合，才能拿到 OIDC token
    environment:
      name: github-pages  # 名字必须是 github-pages，不能修改！
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 最新版，原生支持 Node.js 24，消除弃用警告

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
