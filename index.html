<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- 🔴 CSP 必须放在最顶部，彻底解决JS拦截、样式加载问题 -->
    <meta 
      http-equiv="Content-Security-Policy" 
      content="default-src 'self';
              script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval';
              style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
              img-src 'self' data: /english-root-tool/;
              connect-src 'self' https://generativelanguage.googleapis.com;
              worker-src 'self' blob:;
              base-uri 'self';
              form-action 'self';"
    >
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/english-root-tool/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EtymMaster</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/english-root-tool/main.tsx"></script>
  </body>
</html>
